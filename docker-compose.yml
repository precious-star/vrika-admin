services:
  admin-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGODB_URI: mongodb://admin-mongo:27017
    volumes:
      - ./backend/keys:/app/keys
    depends_on:
      admin-mongo:
        condition: service_healthy

  admin-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4001:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000

  admin-mongo:
    image: mongo:7
    volumes:
      - admin_mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  admin_mongo_data:
